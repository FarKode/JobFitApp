<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JobFit — ATS Resume Score Checker & CV Builder. Legal documents including Privacy Policy and Terms of Service.">
    <title>JobFit — Legal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1B2A4A;
            --primary-light: #2A3F6B;
            --accent: #D4A843;
            --accent-light: #E8C96A;
            --surface: #F8F7F4;
            --surface-card: #FFFFFF;
            --text-primary: #1A1A2E;
            --text-secondary: #6B7280;
            --divider: #E5E7EB;
            --radius: 16px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--surface) 0%, #EDE9E0 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        .logo-box {
            width: 96px; height: 96px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 28px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 12px 40px rgba(27, 42, 74, 0.25);
        }

        .logo-box svg { width: 48px; height: 48px; fill: var(--accent-light); }

        h1 {
            font-size: 32px; font-weight: 800; letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 16px; color: var(--text-secondary); font-weight: 500;
            margin-bottom: 40px;
        }

        .links {
            display: flex; flex-direction: column; gap: 16px;
            width: 100%; max-width: 400px;
        }

        .links a {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--surface-card);
            border: 1px solid var(--divider);
            border-radius: var(--radius);
            padding: 20px 24px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600; font-size: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            transition: all 0.2s ease;
        }

        .links a:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border-color: var(--accent);
        }

        .links a .arrow {
            color: var(--accent);
            font-size: 20px;
        }

        .footer {
            margin-top: 48px;
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .footer .brand { font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

    <div class="logo-box">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/>
        </svg>
    </div>

    <h1>JobFit</h1>
    <p class="tagline">ATS Resume Score Checker & CV Builder</p>

    <div class="links">
        <a href="privacy-policy.html">
            <span>🔒 Privacy Policy</span>
            <span class="arrow">→</span>
        </a>
        <a href="terms-of-service.html">
            <span>📄 Terms of Service</span>
            <span class="arrow">→</span>
        </a>
    </div>

    <footer class="footer">
        <p>© 2026 <span class="brand">JobFit</span>. All rights reserved.</p>
    </footer>

</body>
</html>
